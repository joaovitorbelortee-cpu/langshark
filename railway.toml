# Railway deploy config — usa o Dockerfile.
# Subir com:  railway up

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand omitido de propósito — usa CMD do Dockerfile (sh -c expande $PORT).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/health"
healthcheckTimeout = 30

# Volume persistente pro ChromaDB.
[[mounts]]
mountPath = "/data"
volumeName = "bot-vendas-data"
