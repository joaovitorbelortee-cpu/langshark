<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LangShark{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/static/ocean.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="app-shell">
    {% block sidebar %}{% include "_sidebar.html" %}{% endblock %}
    <main class="main">
      {% block header %}{% include "_header.html" %}{% endblock %}
      <div class="content">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <div id="toast-host" class="toast-host"></div>
  <div id="modal-slot"></div>
  <script src="/admin/static/app.js"></script>
  {% block scripts_extra %}{% endblock %}
</body>
</html>
