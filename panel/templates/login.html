<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangShark — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/static/ocean.css" />
</head>
<body class="login-body">
  <div class="login-bg">
    <svg class="wave" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path fill="rgba(56,178,172,0.05)" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,144C672,139,768,181,864,202.7C960,224,1056,224,1152,202.7C1248,181,1344,139,1392,117.3L1440,96L1440,320L0,320Z"></path>
    </svg>
    <svg class="wave wave-2" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path fill="rgba(34,211,238,0.04)" d="M0,224L60,213.3C120,203,240,181,360,170.7C480,160,600,160,720,176C840,192,960,224,1080,224C1200,224,1320,192,1380,176L1440,160L1440,320L0,320Z"></path>
    </svg>
  </div>

  <div class="login-card">
    <div class="login-brand">
      <span class="brand-icon-big">🦈</span>
      <h1 class="brand-text-big">LangShark</h1>
      <p class="brand-tagline">Painel administrativo</p>
    </div>

    <form method="POST" action="/admin/login" class="login-form">
      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <label class="field">
        <span class="field-label">Email</span>
        <input type="email" name="email" required autocomplete="email" autofocus
               placeholder="admin@exemplo.com" class="input" />
      </label>

      <label class="field">
        <span class="field-label">Senha</span>
        <input type="password" name="password" required autocomplete="current-password"
               placeholder="••••••••" class="input" />
      </label>

      <button type="submit" class="btn btn-primary btn-full">Entrar</button>
    </form>
  </div>
</body>
</html>
